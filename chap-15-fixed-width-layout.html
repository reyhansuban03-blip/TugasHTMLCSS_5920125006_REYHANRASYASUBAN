<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 80%;
    background-color: white;
    padding: 40px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

header h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: #333;
}

.feature {
    background-color: #e0e0e0;
    margin: 40px 0;
    padding: 100px 0;
    font-size: 24px;
    color: #666;
}

.columns {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 40px;
}

.col {
    flex: 1;
    background-color: #e0e0e0;
    padding: 40px 10px;
    color: #666;
}

footer {
    border-top: 1px solid #ccc;
    padding-top: 20px;
    font-size: 14px;
    color: #888;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Logo</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Products</a>
                <a href="#">Services</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <section class="feature">
            <p>Feature</p>
        </section>

        <section class="columns">
            <div class="col">Column One</div>
            <div class="col">Column Two</div>
            <div class="col">Column Three</div>
        </section>

        <footer>
            <p>&copy; Copyright 2011</p>
        </footer>
    </div>

</body>
</html>
</body>
</html>

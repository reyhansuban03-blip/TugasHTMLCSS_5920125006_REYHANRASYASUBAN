<!doctype html>
<html lang="en">
<head>
    <style>
    img.large {
        width: 500px;
        height: 500px;
    }
    img.medium {
        width: 250px;
        height: 250px;
    }
    img.small {
        width: 100px;
        height: 100px;
    }
    </style>
</head>
<body>
    <img src="bunga.jpeg" class="large" alt="Magnolia" />
    <img src="bunga.jpeg" class="medium" alt="Magnolia" />
    <img src="bunga.jpeg" class="small" alt="Magnolia" />
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <style>
    fieldset {
        width: 350px;
        border: 1px solid #dcdcdc;
        border-radius: 10px;
        padding: 20px;
        text-align: right;
    }
    legend {
        background-color: #ffffff;
        border: 1px solid #dcdcdc;
        border-radius: 10px;
        padding: 10px 20px;
        text-align: left;
        text-transform: uppercase;
    }
    .input-group{
        margin-bottom: 15px;
        text-align: left;
    }
    input{
        width: 100%;
        border: none;
        border-bottom: 1px solid #eee;
        padding: 5px 0;
    }
    button{
        background-color: #5f2301;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
    }
    </style>
</head>
<body>
    <fieldset>
        <legend>NEWSLETTER</legend>
        <div class="input-group">
        <label for="name">Name:</label>
        <input type="text" id="name" />
        </div>
        <div class="input-group">
        <label for="email">Email</label>
        <input type="text" id="email" />
        </div>
        <button type="submit">Subscribe</button>
    </fieldset>
    </body>
</html>

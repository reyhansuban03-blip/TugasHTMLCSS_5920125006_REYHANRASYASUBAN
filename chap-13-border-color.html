<html lang="en">
    <head>

            gap: 20px;
            padding: 20px;
            background-color: #f0f8ff;
        }
        .box{
            border: 2px solid black;
            padding: 10px;

            max-width: 300px;

            background-color: white;
            font-size: 1.2rem;
            line-height: 1.4;
        }
        .box-1{
        border-color:  blue;
        }
        .box-2{
        border-color: #bbbbaa #111111 #ee3e80 #0088dd;
        }
    </style>
</head>
    <body>
    <div class="container">
        <div class="box box-1">

            1972.</p>
        </div>
</body>
</html>

<!doctype html>
<html>
    <head>
    <style>
    div {
        border-bottom: 1px solid #efefef;
        margin: 10px;
        padding-bottom: 10px;
        width: 260px;
    }
    .title {
        float: left;
        width: 100px;
        text-align: right;
        padding-right: 10px;
    }
    .radio-buttons label {
        float: none;
    }
    .submit {
        text-align: right;
    }
    button {
        padding: 2px 15px;
        border-radius: 10px;
        border: 1px solid #999;
        background-color: #eee;
        cursor: pointer;
    }
    </style>
</head>
<body>
    <div class="container">
    <div class="form-group">
        <label>Name:</label>
        <input type="text" />
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" />
    </div>

    <div class="form-group">
        <label>Gender:</label>
        <div style="width: 156px">
            <input type="radio" name="gender" id="m" /> <label for="m">M</label>
            <input type="radio" name="gender" id="f" /> <label for="f">F</label>
        </div>
    </div>

    <div class="button-container">
        <button type="submit">Register</button>
    </div>
    </div>
</body>
</html>

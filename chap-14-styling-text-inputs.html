<!doctype html>
<html lang="en">
  <head>
    <style>
      .form-container{
        width: 350px;
        padding: 20px;
      }
      .input-group{
        display: flex;
        align-items: center;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
        background-color: #f9f9f9;
      }
      .icon-box{
        width: 50px;
        height: 50px;
        border-right: 1px solid #ccc;
        background-color: #e0e0e0;
        background-repeat: no-repeat;
        background-position: center;
        background-size: 24px;
      }
      .email{
        background-image: url(email.jpeg);
      }
      .twitter{
        background-image: url(t.jpeg);
      }
      .web{
        background-image: url(bumi.jpeg);
      }
      input{
        flex: 1;
        border: none;
        padding: 10px 15px;
        font-size: 16px;
        background: transparent;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <div class="input-group">
        <div class="icon-box email"></div>
        <input type="text" placeholder="Email">
      </div>
      <div class="input-group">
        <div class="icon-box twitter"></div>
        <input type="text" placeholder="Twitter">
      </div>
      <div class="input-group">
        <div class="icon-box web"></div>
        <input type="text" placeholder="Website">
      </div>
    </div>
  </body>
</html>

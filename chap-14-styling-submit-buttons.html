<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        input#submit{
            color: #444444;
            text-shadow: 0px 1px 1px #ffffff;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #a4a4a4;
            border-bottom: 2px solid #b2b2b2;
            background-color: #b9e4e3;
            background: -webkit-linear-gradient(top, #beeae9, #a8cfce);
            background: -moz-linear-gradient(top, #beeae9, #a8cfce);
            background: -o-linear-gradient(top, #beeae9, #a8cfce);
            background: -ms-linear-gradient(top, #beeae9, #a8cfce);
            background: linear-gradient(to bottom, #beeae9, #a8cfce);
        }
        input#submit:hover{
            color: #333333;
            border-top: 2px solid #b2b2b2;
            background-color: #a0dbc4;
            background: -webkit-linear-gradient(top, #333333, #a8cfce);
            background: -moz-linear-gradient(top, #333333, #a8cfce);
            background: -o-linear-gradient(top, #333333, #a8cfce);
            background: -ms-linear-gradient(top, #333333, #a8cfce);
            background: linear-gradient(to bottom, #333333, #a8cfce);
        }
    </style>
</head>
<body>
    <input type="submit" id="submit" value="Register">
</body>
</html>
